<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#059669"/>
  
  <!-- Accent bar -->
  <rect x="0" y="0" width="800" height="80" fill="#34d399" opacity="0.3"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#grid)"/>
  
  <!-- Template name -->
  <text x="400" y="200" font-family="Arial, sans-serif" font-size="48" font-weight="bold" 
        fill="#ffffff" text-anchor="middle">Pediatric Dentist</text>
  
  <!-- Industry badge -->
  <rect x="300" y="240" width="200" height="40" rx="20" fill="#34d399"/>
  <text x="400" y="267" font-family="Arial, sans-serif" font-size="18" 
        fill="#ffffff" text-anchor="middle">Healthcare</text>
  
  <!-- Style variant -->
  <text x="400" y="320" font-family="Arial, sans-serif" font-size="24" 
        fill="#ffffff" text-anchor="middle" opacity="0.8">bold Style</text>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="500" r="60" fill="#34d399" opacity="0.2"/>
  <circle cx="700" cy="100" r="80" fill="#34d399" opacity="0.15"/>
  <circle cx="650" cy="520" r="50" fill="#34d399" opacity="0.25"/>
  
  <!-- Footer -->
  <text x="400" y="560" font-family="Arial, sans-serif" font-size="16" 
        fill="#ffffff" text-anchor="middle" opacity="0.6">Digitpen Hub Suite Template</text>
</svg>